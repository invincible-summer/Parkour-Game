<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹跑者 · Neon Runner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="stage">
    <canvas id="game" width="960" height="544"></canvas>

    <!-- 主菜单 -->
    <div id="menu" class="overlay">
      <h1 class="title">霓虹跑者</h1>
      <p class="subtitle">NEON RUNNER</p>
      <div class="menu-buttons">
        <button id="btn-endless" class="primary">无尽模式</button>
        <button id="btn-levels" class="primary">关卡模式</button>
      </div>
      <p class="meta">最高分 <span id="best-score">0</span></p>
      <p id="menu-unlocked" class="meta"></p>
      <p class="hint">空格/↑/W 跳跃 · ↓/S 滑铲 · 自动向前奔跑<br>P 暂停 · F1 调试 · R 重开</p>
    </div>

    <!-- 关卡选择 -->
    <div id="level-ui" class="overlay hidden">
      <h2 class="title sm">选择关卡</h2>
      <div id="level-list" class="level-list"></div>
      <button id="levels-back" class="ghost">返回</button>
    </div>

    <!-- HUD -->
    <div id="game-ui" class="hud hidden">
      <div class="hud-left">
        <span id="hud-mode" class="hud-mode"></span>
        <span class="hud-stat">距离 <b id="hud-score">0</b></span>
        <span class="hud-stat">金币 <b id="hud-coins">0</b></span>
        <span class="hud-stat">最高 <b id="hud-best">0</b></span>
      </div>
    </div>

    <!-- 暂停 -->
    <div id="pause-ui" class="overlay hidden">
      <h2 class="title sm">已暂停</h2>
      <button id="btn-resume" class="primary">继续</button>
      <button id="btn-menu-pause" class="ghost">返回主菜单</button>
    </div>

    <!-- 结束 -->
    <div id="over-ui" class="overlay hidden">
      <h2 class="title sm">坠落</h2>
      <p class="meta">距离 <b id="over-score">0</b></p>
      <p class="meta">金币 <b id="over-coins">0</b></p>
      <p class="meta">最高 <b id="over-best">0</b></p>
      <p id="over-newbest" class="newbest hidden">★ 新纪录！</p>
      <button id="btn-restart" class="primary">再来一次</button>
      <button id="btn-menu-over" class="ghost">返回主菜单</button>
    </div>

    <!-- 通关 -->
    <div id="done-ui" class="overlay hidden">
      <h2 class="title sm">通关！</h2>
      <p class="meta">已完成 <b id="done-name"></b></p>
      <button id="btn-next" class="primary">下一关</button>
      <button id="btn-replay" class="ghost">重玩</button>
      <button id="btn-menu-done" class="ghost">返回主菜单</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
